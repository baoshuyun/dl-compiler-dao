name: CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install & test (mini-dl + MLIR + Soft_Stack)
        run: |
          pip install pytest pytest-cov numpy
          cd mini-dl-compiler && pip install -e . && cd ..
          cd NPU_Soft_Hard_Stack && pip install -e . && cd ..
          cd mini-dl-compiler
          pytest tests/ ../NPU_Project/sim/test_mlir.py -v --cov=compiler --cov-report=xml:coverage_minidl.xml --cov-report=term
          cd ../NPU_Soft_Hard_Stack
          python -m pytest tests/ -v --cov=npu_stack --cov-report=xml:coverage_softstack.xml --cov-report=term

      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        working-directory: mini-dl-compiler
        run: |
          pip install ruff
          ruff check compiler/ tests/

      - name: Type check (mypy)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        working-directory: mini-dl-compiler
        run: |
          pip install mypy numpy
          mypy compiler/ --ignore-missing-imports --strict

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v3
        with:
          files: mini-dl-compiler/coverage_minidl.xml,NPU_Soft_Hard_Stack/coverage_softstack.xml
          flags: unittests
          fail_ci_if_error: false
